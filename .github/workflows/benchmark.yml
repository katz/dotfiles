name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    runs-on: macos-14
    timeout-minutes: 5
    permissions:
      contents: "read"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: brew install gnu-time chezmoi

      - name: Configure chezmoi for CI
        run: |
          mkdir -p "${HOME}/.config/chezmoi"
          cat > "${HOME}/.config/chezmoi/chezmoi.yaml" <<'EOF'
          data:
            name: "CI User"
            email: "ci@example.com"
            system: "client"
            isAppleSiliconMac: true
            isLinux: false
            isClient: true
            isServer: false
          EOF

      - name: Apply dotfiles
        run: chezmoi apply --source="${GITHUB_WORKSPACE}/home"

      - name: Run benchmark
        run: scripts/run_benchmark.sh | tee benchmark-result.json

      - name: Show benchmark result
        run: cat benchmark-result.json

      - name: Upload benchmark result
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: benchmark-result
          path: benchmark-result.json
