name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      contents: "read"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get update
          sudo apt-get install -y time
          curl -fsLS get.chezmoi.io | sudo sh -s -- -b /usr/local/bin

      - name: Configure chezmoi for CI
        run: |
          mkdir -p "${HOME}/.config/chezmoi"
          cat > "${HOME}/.config/chezmoi/chezmoi.yaml" <<'EOF'
          data:
            name: "CI User"
            email: "ci@example.com"
            system: "client"
            isAppleSiliconMac: false
            isLinux: true
            isClient: true
            isServer: false
            isWSL: false
          EOF

      - name: Apply dotfiles
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: chezmoi apply --source="${GITHUB_WORKSPACE}/home"

      - name: Run benchmark
        run: scripts/run_benchmark.sh | tee benchmark-result.json

      - name: Show benchmark result
        run: cat benchmark-result.json

      - name: Upload benchmark result
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmark-result
          path: benchmark-result.json
          archive: false
